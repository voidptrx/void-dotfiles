[main]
font=Terminess Nerd Font Propo:size=12:weight=Bold
use-bold=yes
dpi-aware=no
fields=name,generic,comment,categories,filename,keywords,exec
terminal=foot
prompt="UNIT-01 > "
placeholder="Search Mainframe..."
icon-theme=Papirus
icons-enabled=yes
show-actions=yes
anchor=center
lines=10
width=35
horizontal-pad=20
vertical-pad=20
inner-pad=8
line-height=22
layer=top
exit-on-keyboard-focus-loss=yes

[colors]
background=000000ff
text=dcd7baff
prompt=5a9ab5ff
input=dcd7baff
match=c8a020ff
selection=5a9ab5ff
selection-text=000000ff
border=1e2530ff
selection-match=c8a020ff

[border]
width=2
radius=0
