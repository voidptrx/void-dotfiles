[main]
font=Terminess Nerd Font Propo:size=11:weight=Bold
use-bold=yes
dpi-aware=no
fields=name,generic,comment,categories,filename,keywords,exec
terminal=foot
prompt=" => "
placeholder="Search and launch"
icon-theme=Papirus
icons-enabled=yes
show-actions=yes
anchor=center
x-margin=10
y-margin=10
lines=10
width=40
horizontal-pad=20
vertical-pad=20
inner-pad=5
line-height=20
letter-spacing=0
image-size-ratio=0.2
layer=top
exit-on-keyboard-focus-loss = yes

[colors]
background=000000ff
prompt=76946aff
input=dcd7baff
text=938aa9ff
match=76946aff
selection=76946aff
selection-text=000000ff
border=76946aff

[border]
width=2
radius=0
